<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能記帳系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 預設淺色主題 (Light/White) */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --primary-color: #4CAF50;
            --expense-color: #F44336;
            --income-color: #2196F3;
            --transition-speed: 0.3s;
        }

        /* 深色主題 (Black/Dark) */
        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f5f5f5;
            --border-color: #444444;
            --primary-color: #4CAF50;
        }

        /* 紅色主題 (Red) */
        [data-theme="red"] {
            --bg-color: #ffebee;
            --card-bg: #ffffff;
            --text-color: #b71c1c;
            --border-color: #ef9a9a;
            --primary-color: #d32f2f;
        }

        /* 藍色主題 (Blue) */
        [data-theme="blue"] {
            --bg-color: #e3f2fd;
            --card-bg: #ffffff;
            --text-color: #0d47a1;
            --border-color: #90caf9;
            --primary-color: #1976d2;
        }

        /* 綠色主題 (Green) */
        [data-theme="green"] {
            --bg-color: #e8f5e9;
            --card-bg: #ffffff;
            --text-color: #1b5e20;
            --border-color: #a5d6a7;
            --primary-color: #388e3c;
        }

        /* 黃色主題 (Yellow) */
        [data-theme="yellow"] {
            --bg-color: #fffde7;
            --card-bg: #ffffff;
            --text-color: #f57f17;
            --border-color: #fff59d;
            --primary-color: #fbc02d;
        }

        /* 新增：紫色主題 (Purple) */
        [data-theme="purple"] {
            --bg-color: #f3e5f5; /* 淺紫背景 */
            --card-bg: #ffffff;
            --text-color: #4a148c; /* 深紫文字 */
            --border-color: #e1bee7;
            --primary-color: #8e24aa;
        }

        /* 新增：粉色主題 (Pink) */
        [data-theme="pink"] {
            --bg-color: #fce4ec; /* 淺粉背景 */
            --card-bg: #ffffff;
            --text-color: #880e4f; /* 深粉文字 */
            --border-color: #f8bbd0;
            --primary-color: #d81b60;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }
        
        header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .theme-selector {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
        }

        .section-card {
            background-color: var(--card-bg);
            padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transition: background-color var(--transition-speed);
        }

        .summary-cards { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .card { font-size: 1.2rem; font-weight: bold; }
        .card.income span { color: var(--income-color); }
        .card.expense span { color: var(--expense-color); }

        form { display: flex; gap: 10px; flex-wrap: wrap; }
        input, select, button {
            padding: 10px; border: 1px solid var(--border-color);
            border-radius: 5px; background-color: var(--bg-color); color: var(--text-color);
        }
        button { cursor: pointer; border: none; font-weight: bold; }
        button.btn-primary { background-color: var(--primary-color); color: white; transition: background-color var(--transition-speed);}
        
        .record-list { list-style: none; padding: 0; }
        .record-list li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid var(--border-color);
        }
        .delete-btn { background: var(--expense-color); color: white; border-radius: 3px; padding: 5px 10px;}
        
        .chart-container { max-width: 300px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Expense Tracker</h1>
            <select id="theme-selector" class="theme-selector">
                <option value="light">⬜ 淺色 (預設)</option>
                <option value="dark">⬛ 深色 (黑)</option>
                <option value="red">🟥 紅色主題</option>
                <option value="blue">🟦 藍色主題</option>
                <option value="green">🟩 綠色主題</option>
                <option value="yellow">🟨 黃色主題</option>
                <option value="purple">🟪 紫色主題</option>
                <option value="pink">🌸 粉色主題</option>
            </select>
        </header>

        <div class="section-card">
            <div class="summary-cards">
                <div class="card income">總收入: <span id="total-income">$0</span></div>
                <div class="card expense">總支出: <span id="total-expense">$0</span></div>
                <div class="card balance">結餘: <span id="total-balance">$0</span></div>
            </div>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div class="section-card">
            <form id="record-form">
                <input type="date" id="date" required>
                <select id="type">
                    <option value="expense">支出</option>
                    <option value="income">收入</option>
                </select>
                <select id="category"></select>
                <input type="number" id="amount" placeholder="金額" required min="1">
                <input type="text" id="note" placeholder="備註 (選填)">
                <button type="submit" class="btn-primary">新增紀錄</button>
            </form>
        </div>

        <div class="section-card">
            <select id="filter-type" style="margin-bottom: 15px;">
                <option value="all">全部類型</option>
                <option value="income">僅收入</option>
                <option value="expense">僅支出</option>
            </select>
            <ul id="record-list" class="record-list"></ul>
        </div>
    </div>

    <script>
        let expenses = [];
        let chartInstance = null;
        const apiBase = '/api/expenses'; 

        // === 更新對應表：收入加入「其他」 ===
        const categoriesMap = {
            expense: ['餐飲', '交通', '居住', '娛樂', '其他'],
            income: ['薪水', '中獎', '其他']
        };

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initCategoryDropdown(); 
            document.getElementById('date').valueAsDate = new Date();
            fetchData();
        });

        function initTheme() {
            const savedTheme = localStorage.getItem('app-theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            const selector = document.getElementById('theme-selector');
            selector.value = savedTheme;

            selector.addEventListener('change', (e) => {
                const selectedTheme = e.target.value;
                document.body.setAttribute('data-theme', selectedTheme);
                localStorage.setItem('app-theme', selectedTheme);
            });
        }

        function initCategoryDropdown() {
            const typeSelect = document.getElementById('type');
            
            function updateCategories() {
                const selectedType = typeSelect.value; 
                const categorySelect = document.getElementById('category');
                
                categorySelect.innerHTML = '';
                
                categoriesMap[selectedType].forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    categorySelect.appendChild(option);
                });
            }

            typeSelect.addEventListener('change', updateCategories);
            updateCategories();
        }

        async function fetchData() {
            try {
                const response = await fetch(apiBase);
                expenses = await response.json();
                updateUI();
            } catch (error) {
                console.error("讀取資料失敗:", error);
            }
        }

        document.getElementById('record-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newRecord = {
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                note: document.getElementById('note').value
            };

            try {
                const response = await fetch(apiBase, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newRecord)
                });
                if (response.ok) {
                    document.getElementById('record-form').reset();
                    document.getElementById('date').valueAsDate = new Date();
                    document.getElementById('type').dispatchEvent(new Event('change'));
                    fetchData(); 
                }
            } catch (error) {
                console.error("新增失敗:", error);
            }
        });

        async function deleteRecord(id) {
            try {
                await fetch(`${apiBase}/${id}`, { method: 'DELETE' });
                fetchData();
            } catch (error) {
                console.error("刪除失敗:", error);
            }
        }

        document.getElementById('filter-type').addEventListener('change', updateUI);

        function updateUI() {
            const filterType = document.getElementById('filter-type').value;
            const filteredExpenses = filterType === 'all' 
                ? expenses 
                : expenses.filter(e => e.type === filterType);

            renderList(filteredExpenses);
            renderSummary();
            renderChart();
        }

        function renderList(data) {
            const list = document.getElementById('record-list');
            list.innerHTML = '';
            data.forEach(record => {
                const sign = record.type === 'income' ? '+' : '-';
                const color = record.type === 'income' ? 'var(--income-color)' : 'var(--expense-color)';
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${record.date} | [${record.category}] ${record.note}</span>
                    <span style="color: ${color}; font-weight: bold; margin-left: auto; margin-right: 15px;">${sign}$${record.amount}</span>
                    <button class="delete-btn" onclick="deleteRecord(${record.id})">刪除</button>
                `;
                list.appendChild(li);
            });
        }

        function renderSummary() {
            let income = 0, expense = 0;
            expenses.forEach(r => {
                if (r.type === 'income') income += r.amount;
                if (r.type === 'expense') expense += r.amount;
            });
            document.getElementById('total-income').textContent = `$${income}`;
            document.getElementById('total-expense').textContent = `$${expense}`;
            document.getElementById('total-balance').textContent = `$${income - expense}`;
        }

        function renderChart() {
            const expenseData = expenses.filter(e => e.type === 'expense');
            const categories = {};
            expenseData.forEach(e => {
                categories[e.category] = (categories[e.category] || 0) + e.amount;
            });

            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{
                        data: Object.values(categories),
                        backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8d6e63'],
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
